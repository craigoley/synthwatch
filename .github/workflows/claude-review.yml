name: Claude review

# Hands-free pipeline: automated REVIEW (advisory) for human PRs + a deterministic
# AUTO-MERGE gated to TRUSTED authors only. Auth uses the Max subscription OAuth
# token, NOT an API key, so there is no per-use API cost.
#
# SECURITY (this is a PUBLIC repo that DEPLOYS the runner to Azure on merge):
# auto-merge is enforced by the `automerge` job's `if:` allowlist — a deterministic
# check on the PR author's login, NOT the LLM. The review job CANNOT merge (it has
# no gh-pr/gh-api tools); merging is solely the automerge job, which never fires for
# a non-allowlisted author even if every check is green.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # claude-code-action rejects non-human actors and errors on them — skip bots
    # (dependabot gets no review but still auto-merges via the trusted allowlist below).
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        env:
          # Authenticate the `gh` CLI used by the Bash tool (comments are posted via
          # the MCP inline tool + the auto-posted tracking comment).
          GH_TOKEN: ${{ github.token }}
        with:
          # Max subscription token — NOT anthropic_api_key (no per-use API cost).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action blocks ALL bot actors by default (checkHumanActor). Allow ONLY
          # github-actions[bot] so legitimate re-triggers (a close+reopen, or any
          # github-actions-initiated run) pass the guard. NOT '*': every other bot —
          # including dependabot[bot], also excluded at the job `if:` above — stays
          # blocked. (Matching is case-insensitive and strips the [bot] suffix.)
          allowed_bots: "github-actions[bot]"
          # Force tag mode on these PR events so the action creates a tracking comment
          # AND wires the GitHub comment + inline-comment MCP tools; the review summary
          # is then posted automatically as Claude's final message.
          track_progress: true
          prompt: |
            You are the automated reviewer for this pull request (the SynthWatch runner:
            a TypeScript browser-check runner). Review the PR diff for correctness,
            security, and bugs (logic errors, missing edge cases, injection/secret/authz
            issues, resource leaks, race conditions).

            You MUST post your review to GitHub using the tools — do not just think it
            through and stop:
              1. Post each specific, actionable finding as an INLINE comment on the exact
                 file/line using the mcp__github_inline_comment__create_inline_comment tool.
              2. Provide your overall summary (verdict + key findings, or an explicit
                 "no issues found") as your final message; it is posted as the PR
                 (tracking) comment automatically.
              3. If your review found no blocking issues, OR the author asked you to fix
                 them, address your actionable findings by committing fixes directly to
                 the PR branch (verify with `npx tsc` / `npm test` where relevant).
            Do NOT merge the PR — merging is handled deterministically by a separate
            workflow job that is gated to trusted authors. You have no merge tools.
          # --allowedTools MUST be a single QUOTED value (claude_args is shell-quote
          # parsed, which splits on UNQUOTED whitespace). The review job is review+fix
          # ONLY: it has git (to commit fixes) but deliberately NO `gh pr` / `gh api`
          # tools, so the LLM is structurally incapable of merging or changing repo
          # settings — merge is the deterministic `automerge` job's job alone.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 50
            --allowedTools "Edit,Write,Read,Bash(git:*),Bash(npx tsc:*),Bash(npm test:*),mcp__github_inline_comment__create_inline_comment"

  # Deterministic hands-free merge — TRUSTED AUTHORS ONLY. This `if:` is the security
  # gate: it fires only when the PR author's login is in the allowlist (the operator
  # craigoley / cao825, the agent craigoleyagent, and dependabot[bot]). Any other
  # author -> the job is skipped -> the PR NEVER auto-merges, even with all checks
  # green. `gh pr merge --auto` enables GitHub native auto-merge, which holds the
  # merge until required status checks pass (once branch protection requires them);
  # without protection it merges as soon as the PR is mergeable.
  automerge:
    runs-on: ubuntu-latest
    if: contains(fromJSON('["craigoley", "cao825", "craigoleyagent", "dependabot[bot]"]'), github.event.pull_request.user.login)
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge, then dispatch Deploy on merge (trusted author)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          echo "PR #$PR by '$LOGIN' is TRUSTED — enabling squash auto-merge."
          gh pr merge "$PR" --repo "$REPO" --auto --squash --delete-branch

          # TOKEN-FREE AUTO-DEPLOY: native auto-merge completes via GITHUB_TOKEN, whose
          # resulting push event GitHub SUPPRESSES — so deploy.yml's `on: push` does NOT
          # fire after an auto-merge (verified; workflow_run off code-scanning default
          # setup doesn't fire either). workflow_dispatch is the documented GITHUB_TOKEN
          # EXCEPTION that IS delivered — so once the PR actually merges, dispatch Deploy.
          # Only if the PR touched deploy-relevant paths (mirrors deploy.yml's path filter).
          FILES=$(gh pr view "$PR" --repo "$REPO" --json files --jq '.files[].path')
          if ! echo "$FILES" | grep -qE '^(runner/|db/|.*Dockerfile$|\.github/workflows/deploy\.yml$)'; then
            echo "No deploy-relevant changes in PR #$PR — not dispatching Deploy."
            exit 0
          fi
          # Wait (bounded) for the auto-merge to land — checks must pass first. If they
          # fail, the PR never merges and we simply never dispatch (a failed-CI merge
          # must not deploy).
          for _ in $(seq 1 60); do
            if [ "$(gh pr view "$PR" --repo "$REPO" --json merged --jq '.merged')" = "true" ]; then
              echo "PR #$PR merged — dispatching Deploy (workflow_dispatch, token-free)."
              gh workflow run deploy.yml --repo "$REPO" --ref main
              exit 0
            fi
            sleep 20
          done
          echo "::notice::PR #$PR not merged within ~20m (checks pending/failed) — Deploy not dispatched."
