name: Claude review

# Hands-free pipeline: automated REVIEW (advisory) for human PRs + a deterministic
# AUTO-MERGE gated to TRUSTED authors only. Auth uses the Max subscription OAuth
# token, NOT an API key, so there is no per-use API cost.
#
# SECURITY (this is a PUBLIC repo that DEPLOYS the runner to Azure on merge):
# auto-merge is enforced by the `automerge` job's `if:` — TWO deterministic conditions,
# NOT the LLM: (1) the PR author's login is in the trusted allowlist, AND (2) the PR's
# base is `main` (the only branch with required checks; arming auto-merge on an
# unprotected base merges instantly — the 2026-07-04 #192 stacked-PR incident). The
# review job CANNOT merge (it has no gh-pr/gh-api tools) and still runs on stacked PRs;
# merging is solely the automerge job, which never fires for a non-allowlisted author
# or a non-main base even if every check is green.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Explicit, deterministic check-run name so the branch-protection required
    # context binds exactly (a bare job id emits the lowercase "review", which is
    # NOT what's required; and "Review" is already taken by the Dependency Review
    # workflow's job, so this gate uses the distinct "Claude review").
    name: Claude review
    # claude-code-action rejects non-human actors and errors on them — skip bots
    # (dependabot gets no review but still auto-merges via the trusted allowlist below).
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Claude review
        id: review
        # FAIL-OPEN: a review crash / timeout must NOT fail the job on its own — the
        # Verdict gate below is the sole arbiter of the conclusion (no/garbled
        # verdict => PASS). Only a parsed BLOCK fails the check.
        continue-on-error: true
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        env:
          # Authenticate the `gh` CLI used by the Bash tool (comments are posted via
          # the MCP inline tool + the auto-posted tracking comment).
          GH_TOKEN: ${{ github.token }}
        with:
          # Max subscription token — NOT anthropic_api_key (no per-use API cost).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action blocks ALL bot actors by default (checkHumanActor). Allow ONLY
          # github-actions[bot] so legitimate re-triggers (a close+reopen, or any
          # github-actions-initiated run) pass the guard. NOT '*': every other bot —
          # including dependabot[bot], also excluded at the job `if:` above — stays
          # blocked. (Matching is case-insensitive and strips the [bot] suffix.)
          allowed_bots: "github-actions[bot]"
          # Force tag mode on these PR events so the action creates a tracking comment
          # AND wires the GitHub comment + inline-comment MCP tools; the review summary
          # is then posted automatically as Claude's final message.
          track_progress: true
          prompt: |
            You are the automated reviewer for this pull request (the SynthWatch runner:
            a TypeScript browser-check runner). Review the PR diff for correctness,
            security, and bugs (logic errors, missing edge cases, injection/secret/authz
            issues, resource leaks, race conditions).

            You MUST post your review to GitHub using the tools — do not just think it
            through and stop:
              1. Post each specific, actionable finding as an INLINE comment on the exact
                 file/line using the mcp__github_inline_comment__create_inline_comment tool.
              2. Provide your overall summary (verdict + key findings, or an explicit
                 "no issues found") as your final message; it is posted as the PR
                 (tracking) comment automatically.
              3. If your review found no blocking issues, OR the author asked you to fix
                 them, address your actionable findings by committing fixes directly to
                 the PR branch (verify with `npx tsc` / `npm test` where relevant).
            Do NOT merge the PR — merging is handled deterministically by a separate
            workflow job that is gated to trusted authors. You have no merge tools.

            FINALLY — end your final message with EXACTLY ONE line, on its own line,
            with nothing after it, choosing one:
              REVIEW_VERDICT: BLOCK
              REVIEW_VERDICT: PASS
            BLOCK ONLY for: (a) a bug that ships broken/incorrect behaviour, (b) a
            security issue, (c) a data-loss/corruption risk, or (d) a breaking change.
            EVERYTHING ELSE IS PASS — style, naming, structure, "consider…",
            suggestions, nits (still POST those as comments; they do NOT block). When
            unsure whether a finding is blocking, choose PASS — Layer 1 already
            ensured this review ran and its comments are visible; over-blocking
            deadlocks merges, so bias to PASS.
          # --allowedTools MUST be a single QUOTED value (claude_args is shell-quote
          # parsed, which splits on UNQUOTED whitespace). The review job is review+fix
          # ONLY: it has git (to commit fixes) but deliberately NO `gh pr` / `gh api`
          # tools, so the LLM is structurally incapable of merging or changing repo
          # settings — merge is the deterministic `automerge` job's job alone.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 50
            --allowedTools "Edit,Write,Read,Bash(git:*),Bash(npx tsc:*),Bash(npm test:*),mcp__github_inline_comment__create_inline_comment"

      # ★ LAYER 2 — findings gate. The verdict lives in Claude's FINAL message, but
      # WHICH source carries it diverges by repo/run (proved live across repos): the
      # runner's lands in execution_file `.result`; the API's #55 landed ONLY in the
      # posted COMMENT, not in execution_file. So parse the UNION of every place the
      # final message can appear and take the LAST REVIEW_VERDICT: execution_file
      # (result entries + assistant text blocks) PLUS Claude's posted comments + review
      # bodies. None of these include the user/prompt (which quotes example verdicts),
      # so the last match is Claude's real verdict. Copied EXACTLY from synthwatch-api
      # so all repos parse identically. BLOCK => exit 1 => the "Claude review" check
      # fails => branch protection holds merge. PASS => exit 0. FAIL-OPEN: only when NO
      # source yields a verdict (a no-op/errored review) => PASS + ::warning:: (a
      # transient LLM hiccup must never deadlock merge; Layer 1 already required the
      # review to RUN). Check-run name is the job name ("Claude review") — unchanged,
      # so the Layer-1 required context still matches. `if: always()` so it decides
      # even when the review step (continue-on-error) failed.
      - name: Gate merge on review verdict
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.review.outputs.execution_file }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # The verdict lives in Claude's FINAL message — but WHICH source carries it diverges by repo
          # (proved live): the runner's lands in execution_file `.result`; this repo's #55 landed in the
          # posted COMMENT, NOT in `.result` (a 443-char summary). So parse the UNION of every place the
          # final message can appear and take the LAST REVIEW_VERDICT: execution_file (result entries +
          # assistant text blocks) PLUS Claude's posted comments + review bodies. None of these include
          # the user/prompt (which quotes example verdicts), so the last match is Claude's real verdict.
          file_text=""
          if [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
            file_text=$(jq -rs '[ (.. | objects | select(.type=="result") | .result? | strings),
                                  (.. | objects | select(.type=="assistant") | (.message?.content? // [])[]? | select(.type=="text") | .text) ]
                                | join("\n")' "$EXECUTION_FILE" 2>/dev/null || echo "")
          fi
          posted=$(gh pr view "$PR" --json comments \
            -q '[.comments[] | select(.author.login | ascii_downcase | test("claude")) | .body] | join("\n")' 2>/dev/null || echo "")
          posted_reviews=$(gh api "repos/$GH_REPO/pulls/$PR/reviews" \
            -q '[.[] | select(.user.login | ascii_downcase | test("claude")) | .body] | join("\n")' 2>/dev/null || echo "")
          verdict=$(printf '%s\n%s\n%s\n' "$file_text" "$posted" "$posted_reviews" \
            | grep -oiE 'REVIEW_VERDICT:[[:space:]]*(BLOCK|PASS)' | tail -1 | grep -oiE '(BLOCK|PASS)' | tr '[:lower:]' '[:upper:]' || true)
          [ -z "$verdict" ] && verdict='<none>'
          echo "[review] exec_file_len=${#file_text} comment_len=${#posted} review_len=${#posted_reviews} parsed_verdict='$verdict'"
          if [ "$verdict" = "BLOCK" ]; then
            echo "::error::Claude review verdict: BLOCK — a blocking finding holds this merge until resolved."
            exit 1
          fi
          if [ "$verdict" = "PASS" ]; then
            echo "[review] verdict PASS — merge may proceed."
            exit 0
          fi
          echo "::warning::[review] no verdict parsed — failing open to PASS (an LLM hiccup must not deadlock merge)."
          exit 0

  # Deterministic hands-free merge — TRUSTED AUTHORS ONLY, MAIN-BASE ONLY. This `if:` is
  # the security gate: it fires only when the PR author's login is in the allowlist (the
  # operator craigoley / cao825, the agent craigoleyagent, and dependabot[bot]) AND the PR
  # targets `main`. Any other author -> skipped -> the PR NEVER auto-merges, even with all
  # checks green. `gh pr merge --auto` enables GitHub native auto-merge, which holds the
  # merge until required status checks pass (once branch protection requires them);
  # without protection it merges as soon as the PR is mergeable.
  # ★ base.ref == 'main' (2026-07-04, PR #192): branch protection + required checks exist
  # ONLY on main — a PR based on an unprotected feature branch (a STACKED PR) has zero
  # required checks, so arming auto-merge there merges it INSTANTLY, unreviewed, into the
  # stack base. A non-main-base PR now skips this job entirely: auto-merge is never armed,
  # and the PR waits for a human (or a retarget to main) — nothing merges by itself.
  automerge:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      contains(fromJSON('["craigoley", "cao825", "craigoleyagent", "dependabot[bot]"]'), github.event.pull_request.user.login)
    permissions:
      contents: write
      pull-requests: write
      actions: write   # required for `gh workflow run` (dispatch Deploy post-merge)
    steps:
      - name: Enable auto-merge, then dispatch Deploy on merge (trusted author)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          echo "PR #$PR by '$LOGIN' is TRUSTED — enabling squash auto-merge."
          gh pr merge "$PR" --repo "$REPO" --auto --squash --delete-branch

          # TOKEN-FREE AUTO-DEPLOY: native auto-merge completes via GITHUB_TOKEN, whose
          # resulting push event GitHub SUPPRESSES — so deploy.yml's `on: push` does NOT
          # fire after an auto-merge (verified; workflow_run off code-scanning default
          # setup doesn't fire either). workflow_dispatch is the documented GITHUB_TOKEN
          # EXCEPTION that IS delivered — so once the PR actually merges, dispatch Deploy.
          # Only if the PR touched deploy-relevant paths (mirrors deploy.yml's path filter).
          FILES=$(gh pr view "$PR" --repo "$REPO" --json files --jq '.files[].path')
          if ! echo "$FILES" | grep -qE '^(runner/|db/|.*Dockerfile$|\.github/workflows/deploy\.yml$)'; then
            echo "No deploy-relevant changes in PR #$PR — not dispatching Deploy."
            exit 0
          fi
          # Wait (bounded) for the auto-merge to land — checks must pass first. If they
          # fail, the PR never merges and we simply never dispatch (a failed-CI merge
          # must not deploy).
          for _ in $(seq 1 60); do
            # NOTE: `gh pr view` has no `merged` JSON field — use `state` (MERGED).
            STATE=$(gh pr view "$PR" --repo "$REPO" --json state --jq '.state' || echo "")
            if [ "$STATE" = "MERGED" ]; then
              echo "PR #$PR merged — dispatching Deploy (workflow_dispatch, token-free)."
              gh workflow run deploy.yml --repo "$REPO" --ref main
              exit 0
            fi
            sleep 20
          done
          echo "::notice::PR #$PR not merged within ~20m (checks pending/failed) — Deploy not dispatched."
