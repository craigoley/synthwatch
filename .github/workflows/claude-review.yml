name: Claude review

# Fleet auto review -> address-comments -> merge pipeline (same as ClawApp and the
# other craigoley repos). Auth uses the Max subscription OAuth token, NOT an API
# key, so there is no per-use API cost.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# contents: write  -> commit fixes to the PR branch and squash-merge.
# pull-requests: write -> post inline + summary comments, merge.
# id-token: write  -> OIDC for the action.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # claude-code-action rejects non-human actors and errors on them — skip bots.
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        env:
          # Authenticate the `gh` CLI used by the Bash tool (gh pr merge/comment).
          GH_TOKEN: ${{ github.token }}
        with:
          # Max subscription token — NOT anthropic_api_key (no per-use API cost).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Force tag mode on these PR events so the action creates a tracking comment
          # AND wires the GitHub comment + inline-comment MCP tools; the review summary
          # is then posted automatically as Claude's final message.
          track_progress: true
          prompt: |
            You are the automated reviewer for this pull request (the SynthWatch runner:
            a TypeScript browser-check runner). Review the PR diff for correctness,
            security, and bugs (logic errors, missing edge cases, injection/secret/authz
            issues, resource leaks, race conditions).

            You MUST post your review to GitHub using the tools — do not just think it
            through and stop:
              1. Post each specific, actionable finding as an INLINE comment on the exact
                 file/line using the mcp__github_inline_comment__create_inline_comment tool.
              2. Provide your overall summary (verdict + key findings, or an explicit
                 "no issues found") as your final message; it is posted as the PR
                 (tracking) comment automatically.
              3. If the PR author has asked to merge, OR your review found no blocking
                 issues, then address any of your own actionable findings by committing
                 fixes directly to the PR branch (verify with `npx tsc` / `npm test`
                 where relevant), and once the branch is clean squash-merge it:
                     gh pr merge --squash --delete-branch
                 If there are unresolved blocking issues and no merge request, leave the
                 PR open with your comments and do not merge.
          # --allowedTools MUST be a single QUOTED value. claude_args is parsed with
          # shell-quote, which splits on UNQUOTED whitespace (it escapes () but not
          # spaces). So any tool pattern containing a space — Bash(gh pr:*),
          # Bash(gh api:*), Bash(npx tsc:*), Bash(npm test:*) — gets shredded into
          # invalid fragments ("Bash(gh", "pr:*)", ...) and silently dropped, which was
          # the root cause of the earlier no-op: gh pr comment/merge were never allowed.
          # Wrapping the whole comma-list in double quotes keeps it one token; the action
          # then comma-splits it, so each pattern survives intact.
          # --model belongs in claude_args (there is no valid top-level --model input).
          claude_args: |
            --model claude-opus-4-8
            --max-turns 50
            --allowedTools "Edit,Write,Read,Bash(git:*),Bash(gh pr:*),Bash(gh api:*),Bash(npx tsc:*),Bash(npm test:*),mcp__github_inline_comment__create_inline_comment"
