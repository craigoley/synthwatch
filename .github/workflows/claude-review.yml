name: Claude review

# Fleet auto review -> address-comments -> merge pipeline (same as ClawApp and the
# other craigoley repos). Auth uses the Max subscription OAuth token, NOT an API
# key, so there is no per-use API cost.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# contents: write  -> commit fixes to the PR branch and squash-merge.
# pull-requests: write -> post inline + summary comments, merge.
# id-token: write  -> OIDC for the action.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # claude-code-action rejects non-human actors and errors on them — skip bots.
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1
        with:
          # Max subscription token — NOT anthropic_api_key (no per-use API cost).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the automated reviewer for this pull request. Review the PR diff
            for correctness, security, and bugs (logic errors, missing edge cases,
            injection/secret/authz issues, resource leaks, race conditions).

            Then take these actions — using GitHub, NOT chat. Do NOT print the review
            as your chat response; the only output the human sees is GitHub comments.

            1. Post specific findings as INLINE comments on the exact lines, using
               the mcp__github_inline_comment__create_inline_comment tool.
            2. Post ONE top-level summary comment with `gh pr comment` (verdict +
               the key findings, or an explicit "no issues found").
            3. If the PR author has asked to merge, OR your review found no blocking
               issues, then address any of your own actionable findings by committing
               fixes directly to the PR branch (git commit + push), and once the
               branch is clean squash-merge it:
                   gh pr merge --squash --delete-branch
               If there are unresolved blocking issues and no merge request, leave the
               PR open with your comments and do not merge.
          claude_args: |
            --model claude-opus
            --max-turns 50
            --allowedTools Edit,Write,Read,Bash(git:*),Bash(gh pr:*),Bash(gh api:*),Bash(npx tsc:*),Bash(npm test:*),mcp__github_inline_comment__create_inline_comment
