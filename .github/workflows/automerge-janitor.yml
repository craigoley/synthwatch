name: Auto-merge janitor

# TWO recoveries, both for trusted PRs, both on the 30-min schedule:
#   1. RE-ENABLE native auto-merge GitHub disabled for a transient reason (the original purpose, below).
#   2. DISPATCH Deploy when main is ahead of the last Deploy with deploy-relevant changes — the token-merge
#      recovery. A GITHUB_TOKEN-completed merge suppresses `on: push`, and the claude-review dispatcher is a
#      ≤20-min poll that misses late/janitor-armed merges; this state-based sweep catches whatever it missed.

# ──────────────────────────────────────────────────────────────────────────────────────────
# RECOVERS a trusted-author PR whose native auto-merge GitHub DISABLED for a transient reason.
#
# The primary `automerge` job (claude-review.yml) enables auto-merge on `pull_request`
# [opened, synchronize, reopened, ready_for_review] — i.e. ONCE, tied to a PR event. But GitHub can
# DISABLE an already-enabled auto-merge on its own (observed 2026-07-18: #340/#341 lost auto-merge at
# 14:37:24 during a burst of three sibling Dependabot PRs merging to main — a mergeability-recompute
# churn). When that happens WITHOUT a new commit (no `synchronize`), nothing re-runs the automerge job,
# so the PR sits green-but-open indefinitely (both sat 2 days until merged by hand).
#
# This sweep closes that gap: on a schedule, RE-ENABLE native auto-merge on every open, non-draft,
# trusted-author PR that currently has auto-merge OFF. It is SAFE — `--auto` never merges a red PR
# (GitHub completes it only when branch protection is satisfied), so a still-failing PR simply waits;
# a green one merges. Idempotent (skips PRs that already have auto-merge enabled).
# ──────────────────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 min — a stuck trusted PR recovers within one window
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: automerge-janitor
  cancel-in-progress: true

jobs:
  reenable:
    runs-on: ubuntu-latest
    permissions:
      contents: write # native auto-merge completes via GITHUB_TOKEN + branch-protection
      pull-requests: write # enable auto-merge
      actions: write # list deploy runs + dispatch Deploy (the token-merge recovery below)
    steps:
      - name: Re-enable auto-merge on trusted, non-draft, auto-merge-off PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # SAME trusted set as the primary automerge job (claude-review.yml). A here-string membership test
          # (not `grep -q` on a pipe) — SIGPIPE-safe per CLAUDE.md's #155/#279/#283 deploy.sh lesson.
          TRUSTED='craigoley cao825 craigoleyagent dependabot[bot]'

          # Open PRs to main, not draft, whose auto-merge is NOT already enabled (autoMergeRequest == null).
          gh pr list --repo "$REPO" --state open --base main \
            --json number,author,isDraft,autoMergeRequest \
            --jq '.[] | select(.isDraft == false) | select(.autoMergeRequest == null) | [.number, .author.login] | @tsv' \
            > /tmp/prs.tsv || { echo "gh pr list failed"; exit 1; }

          if [ ! -s /tmp/prs.tsv ]; then echo "No open PR needs auto-merge re-enabled."; exit 0; fi

          while IFS=$'\t' read -r NUM LOGIN; do
            [ -n "$NUM" ] || continue
            if [[ " $TRUSTED " != *" $LOGIN "* ]]; then
              echo "PR #$NUM by '$LOGIN' — not a trusted author, skipping."
              continue
            fi
            echo "PR #$NUM by '$LOGIN' has auto-merge OFF — re-enabling squash auto-merge (waits for green)."
            # `|| true`: a PR that can't take auto-merge right now (e.g. a real conflict → DIRTY) must not fail
            # the sweep for the others; the next window retries once Dependabot rebases it.
            gh pr merge "$NUM" --repo "$REPO" --auto --squash --delete-branch \
              || echo "  (could not enable auto-merge on #$NUM — likely conflicting; will retry next window)"
          done < /tmp/prs.tsv

      # ★ TOKEN-MERGE DEPLOY RECOVERY — the fix for the 2026-07-23 incidents-500 outage.
      # A trusted PR that merges via GITHUB_TOKEN (native auto-merge completing, whether armed by the
      # claude-review `automerge` job OR re-armed by this janitor) produces a push GitHub SUPPRESSES —
      # verified: docs.github.com/actions/concepts/security/github_token, "events triggered by the
      # GITHUB_TOKEN, with the exception of workflow_dispatch and repository_dispatch, will not create a
      # new workflow run". So `deploy.yml`'s `on: push` never fires. The claude-review job dispatches Deploy
      # itself, but only via a ≤20-minute poll tied to the PR event — so it MISSES a merge that lands later
      # (a re-run/slow check; #361 merged after its 20m window) and a janitor-re-armed merge (no dispatcher
      # at all). This step closes both: it is STATE-BASED (compares main HEAD to the last Deploy) and runs
      # every 30 min, so it catches any deploy-relevant commit on main that no Deploy has picked up —
      # regardless of which path merged it. Idempotent: skips when main is already deployed/in-flight.
      - name: Dispatch Deploy if main is ahead of the last deploy (token-merge recovery)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}   # the default-branch HEAD at schedule time = origin/main
        run: |
          set -euo pipefail
          # The newest Deploy run's headSha is what has been built+rolled (or is being). deploy.yml runs on
          # workflow_dispatch/push with headSha = main HEAD at that time, so this is the authoritative
          # "what main sha has a Deploy". Include in_progress so we never double-dispatch one already flying.
          LAST=$(gh run list --repo "$REPO" --workflow deploy.yml --limit 30 \
                   --json headSha,status,conclusion \
                   --jq '[.[] | select(.status=="in_progress" or .conclusion=="success")][0].headSha // ""')
          if [ -z "$LAST" ]; then
            echo "::notice::No prior successful/in-flight Deploy found — not dispatching (nothing to compare against)."
            exit 0
          fi
          if [ "$LAST" = "$HEAD_SHA" ]; then
            echo "main ($HEAD_SHA) is already deployed or in-flight ($LAST) — nothing to do."
            exit 0
          fi
          # main advanced past the last Deploy. Dispatch ONLY if the delta touches deploy-relevant paths —
          # the SAME filter as deploy.yml's on.push.paths (runner/**, db/** except *.md, **/Dockerfile,
          # the deploy workflow itself). Uses the compare API (no checkout needed).
          CHANGED=$(gh api "repos/$REPO/compare/$LAST...$HEAD_SHA" --jq '.files[].filename' 2>/dev/null || echo "")
          RELEVANT=$(printf '%s\n' "$CHANGED" | grep -vE '^db/.*\.md$' \
                       | grep -E '^(runner/|db/|.*Dockerfile$|\.github/workflows/deploy\.yml$)' || true)
          if [ -z "$RELEVANT" ]; then
            echo "main is ahead of $LAST but only non-deploy paths changed — no Deploy needed."
            exit 0
          fi
          # LOUD (item 7 visibility): a merged-but-undeployed runner/db commit reached main with no Deploy.
          echo "::warning title=main ahead of deployed image — dispatching recovery Deploy::main ($HEAD_SHA) is ahead of the last Deploy ($LAST) with deploy-relevant changes and no Deploy fired (token-merged push is suppressed). Dispatching now."
          printf '  relevant changes:\n%s\n' "$RELEVANT" | sed 's/^/    /'
          gh workflow run deploy.yml --repo "$REPO" --ref main
          echo "Deploy dispatched for main ($HEAD_SHA)."
