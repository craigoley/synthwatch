name: CI gate

# ──────────────────────────────────────────────────────────────────────────────────────────
# ci-gate — ONE always-reporting required status check that aggregates the PR's other checks.
#
# WHY: a required status check that gets SKIPPED can permanently deadlock a merge. #102 (a
# Dependabot esbuild bump) sat BLOCKED forever despite every check SUCCESS/SKIPPED, because
# `scan-pr / osv-scan` is required but its workflow is `if:`-skipped on Dependabot PRs — and
# because it's a REUSABLE-workflow call, a skipped caller creates NO check run with that nested
# context name, so branch protection waits for "Expected" forever. (A skipped DIRECT job reports
# a `skipped` check run, which GitHub counts as satisfied — that's why `Claude review`, also
# skipped on Dependabot, didn't block.) This is a CLASS bug: ANY required check that can be
# skipped (job `if:`, path filter, reusable caller) can deadlock a merge.
#
# THE FIX (GitHub's canonical answer): make branch protection require ONLY this one job. It
# ALWAYS runs (no `if:`, no path filter) so its context ALWAYS reports, and it FAILS ONLY when a
# sibling check actually FAILED. Skipped / absent siblings (the Dependabot / path-filter case)
# do NOT block. So a skipped osv-scan no longer deadlocks, but a REAL failure still holds merge.
#
# NOTE ON IMPLEMENTATION: the textbook `needs: [job, …]` + `join(needs.*.result)` aggregator only
# works WITHIN ONE workflow. This repo's required checks live in SIX workflow files (eslint /
# semgrep / codeql / osv-scanner-pr / claude-review / + Copilot review), and `needs:` cannot
# reference jobs across files. So ci-gate instead reads the PR head commit's CHECK RUNS (across
# all workflows) and applies the same logic — fail only on a real failure conclusion.
#
# ★ THE RULE (what gates) — branch protection requires ONLY `ci-gate`, so ci-gate IS the merge gate:
#   • EVERY check present on the PR head GATES: it must reach a TERMINAL state and not have failed.
#     That includes the SLOW ones (CodeQL / code-scanning / mutation / osv) — the gate now WAITS for
#     them. Previously it judged the snapshot taken the moment REQUIRED went terminal, so a slower
#     check still in_progress had conclusion=null, was never counted, and could fail AFTER ci-gate
#     had already passed. Branch protection required only ci-gate, so that merged.
#   • EXTERNAL checks representing a real BUILD/DEPLOY outcome GATE; notification/comment bots do NOT.
#   • ADVISORY (declared below) never waits, never blocks — only for checks that are advisory BY THEIR
#     OWN WORKFLOW'S DESIGN, and notification bots.
#   • ORCHESTRATION (ci-gate/automerge/heal) NEVER waits — waiting is a DEADLOCK: self-heal's `heal`
#     polls "waiting for ci-gate to conclude", so a mutual wait spins both to timeout and blocks EVERY PR.
#   • An UNCLASSIFIED check GATES by default (fail-safe): a new check must be explicitly declared
#     advisory to stop blocking.
#   The logic lives in scripts/ci-gate-eval.sh and is SELF-TESTED by this job on every PR.
#
# ★ Branch protection must be flipped to require ONLY `ci-gate` (the granular contexts can stay
#   as jobs — they still run + report; ci-gate just aggregates them). That flip is admin config
#   and is Craig's to run — see the PR description for the exact `gh api` PATCH.
# ──────────────────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]

permissions:
  checks: read
  contents: read

concurrency:
  group: ci-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.event.pull_request.head.sha }}
      # REQUIRED — must additionally REGISTER (fail-closed: a required check that never registers ->
      # timeout -> ci-gate FAILS; never a silent pass). Everything else present gates too (the rule above).
      # ★ "Scan" was REMOVED from this list: it is semgrep.yml's JOB, which is `continue-on-error: true`
      #   + "Never fail the build here" — it can NEVER go red, so requiring it asserted NOTHING while
      #   looking like a gating SAST control. The REAL Semgrep gate is the code-scanning check
      #   "Semgrep OSS" (app=github-advanced-security), which now gates via the all-checks-terminal rule.
      REQUIRED: >-
        ["Lint","Analyze (javascript-typescript)","Analyze (actions)","Claude review","Lib-flow parity","Test (Node + Postgres)","Deploy-script tests"]
      # ★ DO NOT add a PATH-FILTERED check to REQUIRED. "Will this freeze synthwatch-api?" (schema-freeze-
      #   preflight.yml, on db/migrations|db/schema.sql) and the mutation-gate run only on some PRs. A REQUIRED
      #   name that never registers is perpetually "missing" → ci-gate times out → EVERY non-matching PR
      #   deadlocks (the #102 skipped-required class). These already GATE when they run via "an UNCLASSIFIED
      #   check gates by default" — ci_gate_failures catches a present failure — so the freeze-guard DOES block a
      #   runner PR that would freeze the api without being REQUIRED. scripts/ci-gate-eval.sh --self-test cases
      #   6-7 assert both halves (gates-when-present; REQUIRED-would-deadlock). Making one required needs a
      #   path-aware conditional-REQUIRED mechanism that does not exist here — do not fake it with a static name.
      # OSV slot: its check-run NAME varies by PR type (nested "scan-pr / osv-scan" when the reusable
      # job runs; the caller "scan-pr" when skipped on Dependabot), so require ANY completed "scan-pr*".
      OSV_PREFIX: scan-pr
      # ADVISORY — never waited for, never blocks. Advisory BY ITS OWN WORKFLOW'S DESIGN:
      #   "Scan" — semgrep.yml: `continue-on-error: true`, "Never fail the build here; findings surface
      #            in the Security tab via SARIF." Its gating counterpart is "Semgrep OSS" (above).
      # ("Review"/dependency-review is NOT advisory here any more — its continue-on-error was removed in
      #  this PR so it gates like synthwatch-api's and the dashboard's: this repo is the Option-C
      #  execute-at-runner-privilege source, so its dependency gate must not be the weakest of the three.)
      ADVISORY: >-
        ["Scan"]
      # ORCHESTRATION — never waited for, never blocks: ci-gate's own plumbing.
      # ★ DEADLOCK GUARD: self-heal's `heal` job polls "waiting for ci-gate to conclude" — if ci-gate
      #   waited for heal, both spin to their timeouts and EVERY PR blocks.
      # ★ Deliberate that a FAILED heal/automerge cannot block a good PR: self-heal is a remediation bot
      #   (it reported FAILURE on every run while the #313 OIDC bug was live — that blocked merges), and
      #   the auto-merge job fails benignly on a draft PR.
      ORCHESTRATION: >-
        ["ci-gate","automerge","heal"]
    steps:
      - name: Checkout (for scripts/ci-gate-eval.sh — the gate's decision logic)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ★ The gate SELF-TESTS its own logic before using it: a regression that would silently WIDEN the
      #   merge gate (or re-introduce the heal deadlock) fails ci-gate loudly on every PR — no new check
      #   name, no new workflow, and the guard can never rot unnoticed.
      - name: Self-test the gate logic (must-go-red anchor + deadlock guard)
        run: bash scripts/ci-gate-eval.sh --self-test

      - name: Aggregate sibling check results (wait for ALL gating checks; fail only on a REAL failure)
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci-gate-eval.sh
          source scripts/ci-gate-eval.sh

          runs_json() {
            # All check runs on the PR head SHA, across every workflow + app, merged across pages.
            # (`--slurp` can't combine with `-q`, so flatten the page array with a separate jq.)
            gh api "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" --paginate --slurp \
              | jq -c '[ .[].check_runs[] | {name, status, conclusion} ]'
          }

          # 1) WAIT until every REQUIRED check is present+completed AND every PRESENT gating check is
          #    terminal. One deadline bounds both, so a hung check is a VISIBLE timeout — never an
          #    invisible pass.
          settled=0
          deadline=$(( $(date +%s) + 900 ))   # 15-minute hard cap
          while :; do
            runs="$(runs_json)"
            not_ready="$(ci_gate_not_ready "${runs}" "${REQUIRED}" "${ADVISORY}" "${ORCHESTRATION}" "${OSV_PREFIX}")"
            if [ -z "${not_ready}" ]; then
              # SETTLE PASS: the code-scanning checks (CodeQL / "Semgrep OSS" / "ESLint") are minted by
              # the SARIF upload a few SECONDS AFTER their Analyze job goes terminal. Re-poll once so a
              # late registrant cannot slip in behind the gate — the same race, one level down.
              [ "${settled}" = "1" ] && break
              settled=1
              echo "all gating checks terminal — settling (re-poll in 20s to catch late registrants)"
              sleep 20
              continue
            fi
            settled=0
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "::error::ci-gate: timed out waiting for check(s) to reach a terminal state:"
              printf '%s\n' "${not_ready}" | sed 's/^/  - /'
              exit 1
            fi
            echo "waiting for check(s) to complete:"
            printf '%s\n' "${not_ready}" | sed 's/^/  - /'
            sleep 15
          done

          # 2) FAIL if ANY gating check concluded in a real failure. Skipped / neutral / success all
          #    pass — so a skipped sibling never deadlocks the merge (#102).
          echo "--- gated check runs ---"
          printf '%s' "${runs}" | jq -r '.[] | "  \(.conclusion // .status)\t\(.name)"' | sort

          fails="$(ci_gate_failures "${runs}" "${ADVISORY}" "${ORCHESTRATION}")"
          if [ -n "${fails}" ]; then
            echo "::error::ci-gate: check(s) FAILED — holding merge:"
            printf '%s\n' "${fails}" | sed 's/^/  - /'
            exit 1
          fi
          echo "ci-gate: every gating check terminal, no failures — merge may proceed."
