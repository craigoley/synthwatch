name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, off-peak (Mondays 02:23 UTC).
    - cron: "23 2 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level; the job below elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Publish results to OpenSSF (OIDC) — required for the badge.
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Scorecard requires credentials NOT be persisted.
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the OpenSSF Scorecard API so the README badge resolves.
          publish_results: true

      # Keep the raw SARIF as a workflow artifact (handy for debugging).
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
