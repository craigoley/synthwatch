name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, off-peak (Mondays 02:23 UTC).
    - cron: "23 2 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level; the job below elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Publish results to OpenSSF (OIDC) — required for the badge.
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Scorecard requires credentials NOT be persisted.
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the OpenSSF Scorecard API so the README badge resolves.
          publish_results: true

      # Keep the raw SARIF as a workflow artifact (handy for debugging).
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
