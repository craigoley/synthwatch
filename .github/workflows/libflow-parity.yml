name: Lib-flow parity

# Two parity checks for the runner's specShim.ts (the lib/flow copy the runner EXECUTES) vs the
# monitors repo (the authoring copy, dead at runtime):
#   1. VENDORED BLOCK — specShim's vendored helpers drift from monitors/lib/flow.ts (check-libflow-parity.mjs).
#   2. MATCHER SURFACE — a spec uses an expect() matcher the mini-shim doesn't implement, which throws a
#      TypeError in a LIVE run while passing local `playwright test` (check-expect-matchers.mjs).
# Both fail closed; both skip on a checkout blip.
#
# No path filter — it ALWAYS runs so the "Lib-flow parity" check is ALWAYS present for ci-gate (a
# path-filtered required check that skips can deadlock the gate's wait loop). It's cheap (~20s).
# Checks out monitors@main with actions/checkout (deterministic — NO raw-CDN propagation lag).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: libflow-parity-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  libflow-parity:
    name: Lib-flow parity
    runs-on: ubuntu-latest
    steps:
      - name: Check out the runner repo
        uses: actions/checkout@v7

      - name: Check out synthwatch-monitors@main (the authoring lib/flow.ts)
        uses: actions/checkout@v7
        with:
          repository: craigoley/synthwatch-monitors
          ref: main
          path: _monitors

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: specShim.ts ↔ lib/flow.ts vendored-block parity
        env:
          LIBFLOW_SRC: _monitors/lib/flow.ts
        run: node scripts/check-libflow-parity.mjs

      - name: specShim expect() covers every matcher the specs use
        env:
          MONITORS_SRC: _monitors
        run: node scripts/check-expect-matchers.mjs
