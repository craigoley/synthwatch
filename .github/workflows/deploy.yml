name: Deploy runner to ACA Job

# Build the runner image and roll it to the Azure Container Apps JOB on merge to
# main. Authentication uses OIDC (federated credential) — no Azure secrets stored
# in the repo; only the non-sensitive client/tenant/subscription IDs are repo vars.
#
# TOKEN-FREE AUTO-DEPLOY after a hands-free auto-merge: native auto-merge completes
# via the default GITHUB_TOKEN, and GitHub SUPPRESSES push-triggered workflows from
# GITHUB_TOKEN events — so `on: push` does NOT fire after an auto-merge. The ONE
# thing that reliably runs on main post-auto-merge is CodeQL (code-scanning default
# setup), which is NOT suppressed. So we ALSO chain off it via `workflow_run`
# (workflow_run is exempt from the GITHUB_TOKEN suppression). The `push` trigger
# still serves direct human pushes; `workflow_dispatch` is the manual fallback.
on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - 'db/**'
      - '**/Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_run:
    workflows: ["CodeQL"]   # the code-scanning run that fires on main post-auto-merge
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Serialize deploys to main; a newer deploy cancels an in-flight older one so two pushes can't
# race back-to-back (mirrors the synthwatch-api fix after the 2026-06-22 deploy-race incident).
concurrency:
  group: deploy-main
  cancel-in-progress: true

# Least privilege: id-token to mint the OIDC token for azure/login, contents to checkout
# + read commit files in the gate.
permissions:
  id-token: write
  contents: read

jobs:
  # Decide whether to deploy and resolve the exact commit. The workflow_run path
  # (auto-merge) can't use `on.push.paths`, so we reproduce the filter here AND
  # require CodeQL success — a failed-CI merge must never deploy the runner.
  gate:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      sha: ${{ steps.decide.outputs.sha }}
    steps:
      - name: Decide deploy + resolve SHA
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
          PUSH_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Manual + direct-push paths: push is already path-filtered by on.push.paths.
          if [ "$EVENT" = "workflow_dispatch" ] || [ "$EVENT" = "push" ]; then
            echo "sha=$PUSH_SHA" >> "$GITHUB_OUTPUT"
            echo "deploy=true"   >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # workflow_run (auto-merge path, where push is suppressed):
          echo "sha=$WR_SHA" >> "$GITHUB_OUTPUT"
          if [ "$WR_CONCLUSION" != "success" ]; then
            echo "::notice::CodeQL concluded '$WR_CONCLUSION' — NOT deploying (a failed-CI merge must not deploy)."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Reproduce the path filter: only deploy if this commit touched runner/db/Dockerfile/deploy.yml.
          CHANGED=$(gh api "repos/$REPO/commits/$WR_SHA" --jq '.files[].filename' || true)
          echo "changed files in $WR_SHA:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(runner/|db/|.*Dockerfile$|\.github/workflows/deploy\.yml$)'; then
            echo "deploy=true"  >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No deploy-relevant changes in $WR_SHA — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: gate
    if: needs.gate.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    env:
      SHA: ${{ needs.gate.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Deploy the EXACT commit (the merge commit for the workflow_run path),
          # not whatever HEAD happens to be.
          ref: ${{ needs.gate.outputs.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push runner image (ACR)
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          # Build context is runner/ (NOT repo root) because the Dockerfile's
          # COPY paths are relative to the runner/ directory.
          inlineScript: |
            az acr build -r synthwatcholey0620 \
              -t synthwatch-runner:${SHA} -t synthwatch-runner:latest \
              -f runner/Dockerfile runner

      - name: Build and push migration image (ACR)
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          # Build context is db/ — Dockerfile.migrate COPYs migrations/ and migrate.sh.
          inlineScript: |
            az acr build -r synthwatcholey0620 \
              -t synthwatch-migrate:${SHA} -t synthwatch-migrate:latest \
              -f db/Dockerfile.migrate db

      # Apply DB migrations BEFORE rolling the new runner image, so the schema is
      # ready when the new code runs. Runs INSIDE Azure (covered by the Postgres
      # AllowAllAzureServices firewall rule) via the pre-provisioned
      # synthwatch-migrate-job, which holds the DB creds in its own ACA secret —
      # the password never reaches GitHub. If migrations fail, this step exits
      # non-zero and the workflow stops here: the new image is NOT rolled.
      - name: Apply DB migrations (ACA Job, inside Azure)
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            JOB=synthwatch-migrate-job
            RG=synthwatch-rg
            IMAGE=synthwatcholey0620.azurecr.io/synthwatch-migrate:${SHA}

            # Point the migrate job at this commit's image.
            az containerapp job update -n "$JOB" -g "$RG" --image "$IMAGE"

            # Start a one-off execution and capture its name.
            EXEC=$(az containerapp job start -n "$JOB" -g "$RG" --query name -o tsv)
            echo "Started migration execution: $EXEC"

            # Poll until the execution reaches a terminal state.
            for _ in $(seq 1 60); do
              STATUS=$(az containerapp job execution show -n "$JOB" -g "$RG" \
                --job-execution-name "$EXEC" --query properties.status -o tsv)
              echo "status: $STATUS"
              case "$STATUS" in
                Succeeded) echo "Migrations applied."; exit 0 ;;
                Failed|Degraded|Cancelled)
                  echo "::error::Migration job $EXEC ended: $STATUS — aborting deploy (image NOT rolled)."
                  exit 1 ;;
              esac
              sleep 10
            done
            echo "::error::Migration job $EXEC did not finish within timeout — aborting deploy."
            exit 1

      - name: Roll the ACA Job to the new image
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          # This is an ACA JOB, not a Container App — use `containerapp job update`,
          # never `containerapp update`.
          inlineScript: |
            az containerapp job update -n synthwatch-runner-job -g synthwatch-rg \
              --image synthwatcholey0620.azurecr.io/synthwatch-runner:${SHA}

      - name: Write deployment summary
        run: |
          {
            echo "### Runner deployed"
            echo ""
            echo "- **Commit SHA:** \`${SHA}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **Runner image:** \`synthwatcholey0620.azurecr.io/synthwatch-runner:${SHA}\`"
            echo "- **Migrations:** applied via \`synthwatch-migrate-job\` before the roll"
            echo "- **ACA Job:** \`synthwatch-runner-job\` (resource group \`synthwatch-rg\`)"
          } >> "$GITHUB_STEP_SUMMARY"
