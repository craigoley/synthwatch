name: Deploy runner to ACA Job

# Build the runner image and roll it to the Azure Container Apps JOB. Authentication
# uses OIDC (federated credential) — no Azure secrets stored in the repo; only the
# non-sensitive client/tenant/subscription IDs are repo vars.
#
# TRIGGERS:
#   push (main, path-filtered) — direct human pushes deploy immediately.
#   workflow_dispatch          — manual fallback AND the token-free auto-deploy path:
#                                the claude-review `automerge` job dispatches this
#                                after a hands-free auto-merge. (Native auto-merge
#                                completes via GITHUB_TOKEN, whose push event GitHub
#                                SUPPRESSES, so `on: push` does NOT fire post-auto-
#                                merge — workflow_run off code-scanning default setup
#                                does not fire either. workflow_dispatch is the
#                                documented GITHUB_TOKEN exception that IS delivered.)
on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - 'db/**'
      - '**/Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Serialize deploys to main; a newer deploy cancels an in-flight older one so two pushes can't
# race back-to-back (mirrors the synthwatch-api fix after the 2026-06-22 deploy-race incident).
concurrency:
  group: deploy-main
  cancel-in-progress: true

# Least privilege: id-token to mint the OIDC token for azure/login, read to checkout.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push runner image (ACR)
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          # Build context is runner/ (NOT repo root) because the Dockerfile's
          # COPY paths are relative to the runner/ directory.
          inlineScript: |
            az acr build -r synthwatcholey0620 \
              -t synthwatch-runner:${{ github.sha }} -t synthwatch-runner:latest \
              -f runner/Dockerfile runner

      - name: Build and push migration image (ACR)
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          # Build context is db/ — Dockerfile.migrate COPYs migrations/ and migrate.sh.
          inlineScript: |
            az acr build -r synthwatcholey0620 \
              -t synthwatch-migrate:${{ github.sha }} -t synthwatch-migrate:latest \
              -f db/Dockerfile.migrate db

      # Apply DB migrations BEFORE rolling the new runner image, so the schema is
      # ready when the new code runs. Runs INSIDE Azure (covered by the Postgres
      # AllowAllAzureServices firewall rule) via the pre-provisioned
      # synthwatch-migrate-job, which holds the DB creds in its own ACA secret —
      # the password never reaches GitHub. If migrations fail, this step exits
      # non-zero and the workflow stops here: the new image is NOT rolled.
      - name: Apply DB migrations (ACA Job, inside Azure)
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            JOB=synthwatch-migrate-job
            RG=synthwatch-rg
            IMAGE=synthwatcholey0620.azurecr.io/synthwatch-migrate:${{ github.sha }}

            # Point the migrate job at this commit's image.
            az containerapp job update -n "$JOB" -g "$RG" --image "$IMAGE"

            # Start a one-off execution and capture its name.
            EXEC=$(az containerapp job start -n "$JOB" -g "$RG" --query name -o tsv)
            echo "Started migration execution: $EXEC"

            # Poll until the execution reaches a terminal state.
            for _ in $(seq 1 60); do
              STATUS=$(az containerapp job execution show -n "$JOB" -g "$RG" \
                --job-execution-name "$EXEC" --query properties.status -o tsv)
              echo "status: $STATUS"
              case "$STATUS" in
                Succeeded) echo "Migrations applied."; exit 0 ;;
                Failed|Degraded|Cancelled)
                  echo "::error::Migration job $EXEC ended: $STATUS — aborting deploy (image NOT rolled)."
                  exit 1 ;;
              esac
              sleep 10
            done
            echo "::error::Migration job $EXEC did not finish within timeout — aborting deploy."
            exit 1

      - name: Roll the ACA Job to the new image
        uses: azure/cli@3c87847598b988e406a2c25e657114d760fd035c # v2.1.0
        with:
          azcliversion: latest
          # This is an ACA JOB, not a Container App — use `containerapp job update`,
          # never `containerapp update`.
          inlineScript: |
            az containerapp job update -n synthwatch-runner-job -g synthwatch-rg \
              --image synthwatcholey0620.azurecr.io/synthwatch-runner:${{ github.sha }}

      - name: Write deployment summary
        run: |
          {
            echo "### Runner deployed"
            echo ""
            echo "- **Commit SHA:** \`${{ github.sha }}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **Runner image:** \`synthwatcholey0620.azurecr.io/synthwatch-runner:${{ github.sha }}\`"
            echo "- **Migrations:** applied via \`synthwatch-migrate-job\` before the roll"
            echo "- **ACA Job:** \`synthwatch-runner-job\` (resource group \`synthwatch-rg\`)"
          } >> "$GITHUB_STEP_SUMMARY"

