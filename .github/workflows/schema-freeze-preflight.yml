name: Schema-freeze pre-flight

# ★ Warn the PERSON WHO BREAKS IT, not the person who finds out. The api's schema-parity gate reads runner
# main LIVE (correct — liveness gives it teeth), so a runner schema change merges green and freezes the api's
# gate on someone else's unrelated PR. This has happened THREE times (countable_run, retry_count,
# audit_check_location_change). This pre-flight runs the API's OWN check-schema-parity.sh (RUNNER_PARITY=1) —
# the SAME enumerator, reused, never a second definition of "schema object" — against THIS PR's schema and the
# api fixture at main. If the PR adds/changes an object the fixture lacks, it reds and NAMES the object.
#
# ★ ADVISORY, NOT A HARD STOP: this is a standalone workflow, deliberately NOT in the required ci-gate. It
# turns red and tells you exactly what to do; it does not forbid the merge (Craig hand-manages merge order by
# choice). A gate that forbids a legitimate workflow gets disabled; one that tells you the next step gets used.

on:
  pull_request:
    paths:
      - 'db/migrations/**'
      - 'db/schema.sql'

concurrency:
  group: schema-freeze-preflight-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Will this freeze synthwatch-api?
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pg
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - name: Checkout runner PR (this repo)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The api OWNS the parity script + the fixture (the source of truth for "what the API mirrors"). Both
      # repos are public; default token reads it. Tracks api MAIN — the same ref the api's gate compares against.
      - name: Checkout synthwatch-api at main (its parity script + fixture)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: craigoley/synthwatch-api
          ref: main
          path: api-repo
          persist-credentials: false

      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      # ★ SATISFIABLE guard (the #310 fix): a check that tells you to open a paired fixture PR must be able to
      # SEE that you did — otherwise it deadlocks the exact pattern it exists to help (runner PR reds → clears
      # only when the fixture PR merges → the fixture PR is blocked until the runner PR merges). So: parity vs
      # api MAIN clean → PASS. Drift vs main → search OPEN api PRs; if one's fixture already mirrors this change
      # → PASS, naming it. No paired PR → RED, naming the object. It reds when you HAVEN'T done the work and
      # clears when you HAVE — a real gate, not a trap.
      - name: Pre-flight — satisfiable freeze guard
        env:
          PGHOST: 127.0.0.1
          PGPORT: '5433'
          PGUSER: postgres
          PGPASSWORD: pg
          GH_TOKEN: ${{ github.token }}
          RUNNER_PARITY: '1'
          RUNNER_SCHEMA: ${{ github.workspace }}/db/schema.sql
          RUNNER_MIGRATIONS: ${{ github.workspace }}/db/migrations
          API_REPO: craigoley/synthwatch-api
          FIXTURE_PATH: tests/SynthWatch.Api.Tests/fixtures/schema.sql
          MAIN_FIXTURE: ${{ github.workspace }}/api-repo/tests/SynthWatch.Api.Tests/fixtures/schema.sql
        run: |
          set +e
          # run the api's OWN parity script (reused enumerator) with this PR's schema + a given fixture file.
          parity() { FIXTURE="$1" bash api-repo/scripts/check-schema-parity.sh > "$2" 2>&1; return $?; }

          # 1) clean against api MAIN → no fixture change is needed at all.
          parity "$MAIN_FIXTURE" /tmp/main.out
          if [ $? -eq 0 ]; then
            echo "✅ No api-fixture change needed — parity is clean against synthwatch-api main."
            exit 0
          fi
          missing="$(grep -E '^(col|con|fn)\|' /tmp/main.out || echo '<see the parity log above>')"

          # 2) SATISFIABLE: does an OPEN api PR already carry the matching fixture? (only re-run parity for PRs
          #    whose fixture actually differs from main — a cheap pre-filter before the ~30s parity run.)
          echo "::group::Drift vs api main — searching open api PRs for a paired fixture"
          found=""
          while read -r n sha; do
            [ -n "$n" ] || continue
            gh api "repos/$API_REPO/contents/$FIXTURE_PATH?ref=$sha" -q '.content' 2>/dev/null | base64 -d > /tmp/cand.sql 2>/dev/null
            [ -s /tmp/cand.sql ] || { echo "  #$n: no fixture at head — skip"; continue; }
            if cmp -s /tmp/cand.sql "$MAIN_FIXTURE"; then echo "  #$n: fixture == main — skip"; continue; fi
            parity /tmp/cand.sql /tmp/cand.out
            if [ $? -eq 0 ]; then echo "  #$n: fixture MIRRORS this change ✓"; found="$n"; break; else echo "  #$n: fixture differs but still doesn't satisfy parity"; fi
          done < <(gh pr list --repo "$API_REPO" --state open --json number,headRefOid --jq '.[] | "\(.number) \(.headRefOid)"')
          echo "::endgroup::"

          if [ -n "$found" ]; then
            { echo "## ✅ Paired api fixture found: ${API_REPO}#${found}"; echo ""
              echo "This PR changes shared schema, and open api PR **#${found}** already carries the matching fixture."; echo ""
              echo "**Merge order:** merge THIS runner PR first — #${found}'s parity flips green against runner \`main\` seconds later, then merge it."; } | tee -a "$GITHUB_STEP_SUMMARY"
            echo "✅ satisfiable: paired fixture ${API_REPO}#${found} present — guard clears."
            exit 0
          fi

          # 3) no paired PR → RED (the work isn't done yet — and now it CAN be done to clear this).
          { echo "## ⚠️ Shared-schema change will FREEZE synthwatch-api — no paired fixture PR exists yet"; echo ""
            echo "Objects the api fixture at main lacks:"; echo '```'; echo "$missing"; echo '```'; echo ""
            echo "### Do this — and this check will CLEAR on its next run:"
            echo "1. Open a **synthwatch-api** PR adding these to \`$FIXTURE_PATH\` (byte-match the runner definition)."
            echo "2. Push it. This guard searches open api PRs, so once it exists the guard goes green here."
            echo "3. Merge THIS runner PR first, then the fixture PR (its parity flips green against runner main)."; } | tee -a "$GITHUB_STEP_SUMMARY"
          echo "::error title=Will freeze synthwatch-api (no paired fixture PR)::Open the paired api fixture PR; this guard clears once it exists."
          exit 1
