name: Mutation gate (PR)

# ★ PR-time mutation gate (task #12). The analysis already paid for itself — it found the paging quorum almost
# entirely unpinned (#307: you could have changed the rule that wakes a human and no test would have died) and
# the rca redaction seam (#306). This makes it CONTINUOUS: the next PR to touch these modules is protected.
#
# Two-layer cost control:
#   1. SCOPE (the `detect` job): mutate only the modules whose source/test files this PR changed. A PR
#      touching only reconcile.ts runs ONE job; a mapper/doc PR runs ZERO. Fail-safe → all 6 on any doubt.
#   2. --incremental: for each selected module, Stryker restores the nightly's cache and re-tests only the
#      mutants in changed code (~1-2 min), not the full module. Each FAILS below its own ratcheting break
#      threshold (scripts/mutation.sh) — a single global floor would let retry.ts (100%) rot to 20%.
# ★ The incremental cache is warmed by the nightly (mutation-nightly.yml, --full-refresh) and restored here.
#   Both layers depend on that cache being REAL: before the --full-refresh fix the nightly saved an empty
#   cache, so layer 2 silently re-ran full (evaluate = 55 min) no matter how well layer 1 scoped.

on:
  pull_request:
    paths:
      - 'runner/**.ts'
      - 'runner/scripts/mutation.sh'

concurrency:
  group: mutation-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ★ Scope the matrix to only the modules this PR can actually affect. A PR touching only reconcile.ts runs
  #   ONE job; a PR touching a mapper/doc (no gated file) runs ZERO jobs (near-instant). The nightly's warm
  #   cache makes each selected job ~1-2 min, so the whole gate is now a couple of minutes, not 30-55.
  # ★★ FAIL-SAFE: ANY doubt — diff error, --deps error, or a change to the gate's own logic (mutation.sh) —
  #   runs ALL 6. A scoping bug MUST fail toward MORE coverage: a PR that silently skips the mutation gate
  #   because change-detection broke is exactly the vacuous-pass this gate exists to prevent.
  detect:
    name: mutation scope
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.scope.outputs.modules }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need base+head history to diff the PR's real changes
      - id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ALL='["retry","transientClass","traceSignals","rca","evaluate","reconcile"]'
          fail_safe() { echo "$1 → running ALL 6 (fail-safe: scope toward MORE coverage)"; echo "modules=$ALL" >> "$GITHUB_OUTPUT"; exit 0; }

          git rev-parse -q --verify "${BASE_SHA}^{commit}" >/dev/null 2>&1 || git fetch -q --no-tags origin "$BASE_SHA" >/dev/null 2>&1 || true
          CHANGED="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" 2>/dev/null)" || fail_safe "git diff failed"
          [ -n "$CHANGED" ] || fail_safe "empty diff (unexpected on a triggered PR)"
          echo "changed files:"; printf '%s\n' "$CHANGED" | sed 's/^/  /'

          # A change to the gate's OWN logic (mutation.sh — which also generates the stryker config) can shift
          # ANY module's mutants, so mutate everything. This is also what keeps --deps drift-proof: editing
          # CMD/MUTATE in mutation.sh forces all 6, and every other PR reads --deps live from the same file.
          if grep -qxF 'runner/scripts/mutation.sh' <<<"$CHANGED"; then
            fail_safe "gate logic (mutation.sh) changed"
          fi

          # Per-module: run a module's job iff one of its source/test files (from `mutation.sh <m> --deps`)
          # is in the diff. --deps is the single source of truth, read live — no hardcoded map to drift.
          selected='[]'
          for m in retry transientClass traceSignals rca evaluate reconcile; do
            deps="$(bash runner/scripts/mutation.sh "$m" --deps)" || fail_safe "mutation.sh --deps failed for $m"
            if grep -qxFf <(printf '%s\n' "$deps") <(printf '%s\n' "$CHANGED"); then
              selected="$(jq -cn --argjson s "$selected" --arg m "$m" '$s + [$m]')"
            fi
          done
          echo "selected modules: $selected"
          echo "modules=$selected" >> "$GITHUB_OUTPUT"

  mutate:
    name: mutation ${{ matrix.module }}
    needs: detect
    if: needs.detect.outputs.modules != '[]'   # no gated file changed → no jobs, near-instant
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect.outputs.modules) }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pg
          POSTGRES_DB: synthwatch
        ports:
          - 5544:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: runner
    env:
      DATABASE_URL: postgres://postgres:pg@127.0.0.1:5544/synthwatch
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Install deps
        run: npm ci
      - name: Materialize the schema (for the DB-backed modules)
        run: |
          for i in $(seq 1 30); do PGPASSWORD=pg psql -h 127.0.0.1 -p 5544 -U postgres -d synthwatch -c 'select 1' >/dev/null 2>&1 && break; sleep 1; done
          PGPASSWORD=pg psql -h 127.0.0.1 -p 5544 -U postgres -d synthwatch -c "SET check_function_bodies=false;" -f ../db/schema.sql >/dev/null
          for f in $(ls ../db/migrations/*.sql | sort); do PGPASSWORD=pg psql -h 127.0.0.1 -p 5544 -U postgres -d synthwatch -c "SET check_function_bodies=false;" -f "$f" >/dev/null; done
      # Restore the incremental cache the nightly saved so a PR only re-runs its changed mutants.
      - name: Restore mutation incremental cache
        uses: actions/cache/restore@v6
        with:
          path: runner/.stryker-incremental
          key: stryker-incremental-${{ matrix.module }}-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            stryker-incremental-${{ matrix.module }}-
      - name: Mutation gate — ${{ matrix.module }} (--incremental, blocking below threshold)
        run: bash scripts/mutation.sh ${{ matrix.module }} --incremental
