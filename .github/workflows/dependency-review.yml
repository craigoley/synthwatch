name: Dependency Review

# Inspects dependency changes in a PR diff and comments a summary.
# Non-blocking (warn-only) — catches a bad dep without walling merges.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        # ★ SHA-pinned + GATING, matching synthwatch-api's and synthwatch-dashboard's identical step.
        # This job WAS `continue-on-error: true` ("Warn-only: never fail the PR"), which made this repo's
        # dependency gate the weakest of the three — and this is the repo whose `main` the runner FETCHES
        # AND EXECUTES at privilege (Option C). A vulnerable/malicious dependency landing here has the
        # widest blast radius of the three, so it must not be the one repo where the check can't go red.
        # ci-gate now gates on it (it is neither ADVISORY nor ORCHESTRATION).
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: always
