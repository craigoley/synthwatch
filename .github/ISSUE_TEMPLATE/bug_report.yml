name: Bug report
description: Report a problem with the SynthWatch runner, schema, or workflows.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** —
        use the private process in [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
      placeholder: When I run a browser check, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can a maintainer reproduce this?
      placeholder: |
        1. Seed a check with kind='browser' and flow_name='...'
        2. Run the runner once
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system?
      options:
        - Runner (HTTP tier)
        - Runner (browser tier / Playwright)
        - Database schema / migration
        - Alerting (email / generic webhook)
        - CI / workflows
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runner version/commit, Node version, how it's deployed (ACA, local docker, …).
      placeholder: |
        - Commit:
        - Node:
        - Deploy: ACA Job / local docker
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste runner output. **Redact any secrets, connection strings, or URLs.**
      render: shell
    validations:
      required: false
